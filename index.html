<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic GRE Vocab Quiz</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .quiz-container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        .question { font-size: 1.4rem; font-weight: bold; margin-bottom: 1.5rem; color: #2c3e50; }
        .options-container { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 12px; border: 2px solid #3498db; border-radius: 8px; background: white; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        button:hover:not(:disabled) { background: #3498db; color: white; }
        button:disabled { cursor: default; }
        #next-btn { margin-top: 1.5rem; background: #2ecc71; color: white; border: none; display: none; width: 100%; font-weight: bold; }
        #status { margin-top: 10px; font-weight: bold; min-height: 24px; }
        .loading { font-style: italic; color: #7f8c8d; }
    </style>
</head>
<body>
    <div class="quiz-container">
        <h1 id="title">GRE Vocab Challenge</h1>
        <div id="quiz-box">
            <p class="loading">Loading words from spreadsheet...</p>
        </div>
        <div id="status"></div>
        <button id="next-btn">Next Question</button>
        <p id="score-track" style="margin-top:20px; font-size: 0.9rem; color: #7f8c8d;"></p>
    </div>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/15QU1K9I19u6W2HtJp_YpILdg4cPQfm01zDDGg3kN8dg/gviz/tq?tqx=out:csv";
        let allWords = [];
        let currentQuizWords = [];
        let currentIndex = 0;
        let score = 0;

        // 1. Fetch data from Google Sheet
        async function initQuiz() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                const rows = data.split('\n').slice(1); // Remove header
                
                allWords = rows.map(row => {
                    // Simple CSV parser for the "Word","Definition" format
                    const parts = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                    if (parts && parts.length >= 2) {
                        return {
                            word: parts[0].replace(/"/g, ''),
                            def: parts[1].replace(/"/g, '')
                        };
                    }
                    return null;
                }).filter(item => item !== null && item.word.length > 1);

                startNewSession();
            } catch (error) {
                document.getElementById('quiz-box').innerHTML = "Failed to load words. Check your connection.";
            }
        }

        // 2. Pick 5 random words for this session
        function startNewSession() {
            score = 0;
            currentIndex = 0;
            currentQuizWords = [...allWords].sort(() => 0.5 - Math.random()).slice(0, 5);
            showQuestion();
        }

        // 3. Display the question
        function showQuestion() {
            const currentItem = currentQuizWords[currentIndex];
            const quizBox = document.getElementById('quiz-box');
            const status = document.getElementById('status');
            const nextBtn = document.getElementById('next-btn');
            
            status.innerText = "";
            nextBtn.style.display = "none";
            document.getElementById('score-track').innerText = `Question ${currentIndex + 1} of 5 | Score: ${score}`;

            // Create distractors (3 random definitions that aren't the correct one)
            let distractors = allWords
                .filter(w => w.word !== currentItem.word)
                .sort(() => 0.5 - Math.random())
                .slice(0, 3)
                .map(w => w.def);

            let options = [...distractors, currentItem.def].sort(() => 0.5 - Math.random());

            quizBox.innerHTML = `
                <div class="question">What is the meaning of: <br><span style="color:#3498db; font-size:1.8rem;">${currentItem.word}</span></div>
                <div class="options-container">
                    ${options.map(opt => `<button onclick="checkAnswer(this, '${opt.replace(/'/g, "\\'")}')">${opt}</button>`).join('')}
                </div>
            `;
        }

        // 4. Handle Answer
        window.checkAnswer = function(btn, selectedDef) {
            const correctDef = currentQuizWords[currentIndex].def;
            const buttons = document.querySelectorAll('.options-container button');
            buttons.forEach(b => b.disabled = true);

            if (selectedDef === correctDef) {
                score++;
                btn.style.background = "#2ecc71";
                btn.style.color = "white";
                document.getElementById('status').innerText = "Correct! 🎯";
                document.getElementById('status').style.color = "#27ae60";
            } else {
                btn.style.background = "#e74c3c";
                btn.style.color = "white";
                document.getElementById('status').innerText = `Incorrect.`;
                document.getElementById('status').style.color = "#c0392b";
                
                // Highlight the right answer subtly
                buttons.forEach(b => {
                    if (b.innerText === correctDef) b.style.border = "2px solid #2ecc71";
                });
            }

            document.getElementById('next-btn').style.display = "block";
            if (currentIndex === 4) document.getElementById('next-btn').innerText = "See Results";
        };

        document.getElementById('next-btn').onclick = () => {
            currentIndex++;
            if (currentIndex < 5) {
                showQuestion();
            } else {
                showFinalScore();
            }
        };

        function showFinalScore() {
            document.getElementById('quiz-box').innerHTML = `
                <h2>Quiz Complete!</h2>
                <p style="font-size:1.5rem;">Final Score: <strong>${score}/5</strong></p>
                <button onclick="startNewSession()" style="background:#3498db; color:white; width:100%;">Try 5 New Words</button>
            `;
            document.getElementById('next-btn').style.display = "none";
            document.getElementById('status').innerText = "";
        }

        initQuiz();
    </script>
</body>
</html>
