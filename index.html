<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRE Vocab Quiz</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .quiz-container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        h1 { color: #2c3e50; margin-bottom: 1.5rem; }
        .question { font-size: 1.2rem; font-weight: bold; margin-bottom: 1rem; color: #34495e; }
        .options-container { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 12px; border: 2px solid #3498db; border-radius: 8px; background: white; cursor: pointer; transition: all 0.2s; font-size: 1rem; }
        button:hover { background: #3498db; color: white; }
        .score { margin-top: 1rem; font-weight: bold; font-size: 1.1rem; color: #27ae60; }
        #next-btn { margin-top: 1.5rem; background: #2ecc71; color: white; border: none; display: none; width: 100%; }
        #result { margin-top: 1rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="quiz-container">
        <h1>GRE Vocab Quiz</h1>
        <div id="quiz-content">
            <div class="question" id="question">Loading...</div>
            <div class="options-container" id="options"></div>
            <div id="result"></div>
            <button id="next-btn" onclick="loadNextQuestion()">Next Word</button>
            <div class="score" id="score">Score: 0/5</div>
        </div>
    </div>

    <script>
        const quizData = [
            { word: "Abstemious", correct: "Moderate in appetite", options: ["Moderate in appetite", "Full of energy", "Extremely wealthy", "Easily angered"] },
            { word: "Adroit", correct: "Skillful; clever", options: ["Skillful; clever", "Lacking balance", "Very old", "Noisy and chaotic"] },
            { word: "Alacrity", correct: "Eagerness; promptness", options: ["Fear of heights", "Eagerness; promptness", "State of confusion", "Laziness"] },
            { word: "Ameliorate", correct: "To improve", options: ["To make worse", "To improve", "To hide away", "To decorate"] },
            { word: "Anachronism", correct: "Something out of its proper time", options: ["A mathematical error", "A type of flower", "Something out of its proper time", "A secret meeting"] }
        ];

        let currentQuestion = 0;
        let score = 0;

        function loadQuestion() {
            const data = quizData[currentQuestion];
            document.getElementById("question").innerText = `What does "${data.word}" mean?`;
            const optionsContainer = document.getElementById("options");
            optionsContainer.innerHTML = "";
            document.getElementById("result").innerText = "";
            document.getElementById("next-btn").style.display = "none";

            // Shuffle options
            const shuffledOptions = [...data.options].sort(() => Math.random() - 0.5);

            shuffledOptions.forEach(option => {
                const btn = document.createElement("button");
                btn.innerText = option;
                btn.onclick = () => checkAnswer(option, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selected, btn) {
            const correct = quizData[currentQuestion].correct;
            const buttons = document.querySelectorAll(".options-container button");
            buttons.forEach(b => b.disabled = true);

            if (selected === correct) {
                score++;
                btn.style.backgroundColor = "#2ecc71";
                btn.style.color = "white";
                document.getElementById("result").innerText = "Correct! ✨";
                document.getElementById("result").style.color = "#27ae60";
            } else {
                btn.style.backgroundColor = "#e74c3c";
                btn.style.color = "white";
                document.getElementById("result").innerText = `Wrong. Correct answer: ${correct}`;
                document.getElementById("result").style.color = "#e74c3c";
            }
            
            document.getElementById("score").innerText = `Score: ${score}/5`;
            document.getElementById("next-btn").style.display = "block";
            if (currentQuestion === quizData.length - 1) {
                document.getElementById("next-btn").innerText = "Finish Quiz";
            }
        }

        function loadNextQuestion() {
            currentQuestion++;
            if (currentQuestion < quizData.length) {
                loadQuestion();
            } else {
                document.getElementById("quiz-content").innerHTML = `<h2>Quiz Completed!</h2><p>Your final score is ${score} out of 5.</p><button onclick="location.reload()">Restart Quiz</button>`;
            }
        }

        loadQuestion();
    </script>
</body>
</html>
